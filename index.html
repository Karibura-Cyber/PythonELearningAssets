<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --border: #e4e2dc;
      --border-hover: #b8b4a8;
      --accent: #1a1a1a;
      --text: #1a1a1a;
      --muted: #9a9690;
      --tag: #ede9e0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .header {
      margin-bottom: 3rem;
      opacity: 0;
      animation: appear 0.5s ease 0.1s forwards;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
    }

    h1 strong {
      font-weight: 500;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: appear 0.4s ease 0.2s forwards;
    }

    /* Grid */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .card {
      display: grid;
      grid-template-columns: 2.5rem 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.18s, background 0.18s;
      opacity: 0;
      animation: slideUp 0.4s ease forwards;
    }

    .card:first-child { border-radius: 8px 8px 0 0; }
    .card:last-child  { border-radius: 0 0 8px 8px; }
    .card:only-child  { border-radius: 8px; }

    /* stack adjacent borders */
    .card + .card { margin-top: -1px; }

    .card:hover {
      background: #fdfcf9;
      border-color: var(--border-hover);
      z-index: 1;
    }

    .card:hover .arrow { opacity: 1; transform: translateX(0); }
    .card:hover .num   { color: var(--accent); }

    /* staggered delays */
    .card:nth-child(1)  { animation-delay: 0.18s; }
    .card:nth-child(2)  { animation-delay: 0.22s; }
    .card:nth-child(3)  { animation-delay: 0.26s; }
    .card:nth-child(4)  { animation-delay: 0.30s; }
    .card:nth-child(5)  { animation-delay: 0.34s; }
    .card:nth-child(6)  { animation-delay: 0.38s; }
    .card:nth-child(7)  { animation-delay: 0.42s; }
    .card:nth-child(8)  { animation-delay: 0.46s; }
    .card:nth-child(9)  { animation-delay: 0.50s; }
    .card:nth-child(10) { animation-delay: 0.54s; }
    .card:nth-child(11) { animation-delay: 0.58s; }

    .num {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--muted);
      transition: color 0.18s;
      text-align: right;
    }

    .name {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .arrow {
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.18s, transform 0.18s;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: appear 0.4s ease 0.7s forwards;
    }

    .footer-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .count-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      background: var(--tag);
      padding: 0.2em 0.6em;
      border-radius: 999px;
      letter-spacing: 0.05em;
    }

    @keyframes appear {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      body { padding: 2rem 1rem; }
    }
  </style>
</head>
