<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --card: #161616;
      --border: #2a2a2a;
      --accent: #c8f135;
      --text: #f0f0f0;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Chakra Petch', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    body > *:not(.bg-canvas) { position: relative; z-index: 1; }

    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Chakra Petch', monospace;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      width: 100%;
      max-width: 560px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.5s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }

    .card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 2px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .card:hover::after { width: 100%; }

    .card-index {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
    }

    .card-name {
      font-family: 'Chakra Petch', monospace;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .card-arrow {
      margin-top: 0.5rem;
      color: var(--accent);
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      transform: translateX(-6px);
    }

    .card:hover .card-arrow { opacity: 1; transform: translateX(0); }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      animation: fadeUp 0.5s 0.5s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas class="bg-canvas" id="bg"></canvas>

  <div class="header">
    <p class="label">Course Navigator</p>
    <h1>Select a <span>Module</span></h1>
  </div>

  <div class="grid">
    <a class="card" href="EP1LIST">
      <span class="card-index">01 /</span>
      <span class="card-name">EP1LIST</span>
      <span class="card-arrow">→ Open</span>
    </a>
    <a class="card" href="EP1NESTEDLOOP/">
      <span class="card-index">02 /</span>
      <span class="card-name">EP1NESTEDLOOP</span>
      <span class="card-arrow">→ Open</span>
    </a>
    <a class="card" href="EP1FUNCTION/">
      <span class="card-index">03 /</span>
      <span class="card-name">EP1FUNCTION</span>
      <span class="card-arrow">→ Open</span>
    </a>
    <a class="card" href="EP2WEEK2">
      <span class="card-index">04 /</span>
      <span class="card-name">EP2WEEK2</span>
      <span class="card-arrow">→ Open</span>
    </a>
    <a class="card" href="EP2WEEK3">
      <span class="card-index">05 /</span>
      <span class="card-name">EP2WEEK3</span>
      <span class="card-arrow">→ Open</span>
    </a>
    <a class="card" href="EP2WEEK4">
      <span class="card-index">06 /</span>
      <span class="card-name">EP2WEEK4</span>
      <span class="card-arrow">→ Open</span>
    </a>
    <a class="card" href="EP2WEEK5">
      <span class="card-index">07 /</span>
      <span class="card-name">EP2WEEK5</span>
      <span class="card-arrow">→ Open</span>
    </a>
    <a class="card" href="EP2WEEK6">
      <span class="card-index">08 /</span>
      <span class="card-name">EP2WEEK6</span>
      <span class="card-arrow">→ Open</span>
    </a>
    <a class="card" href="PythonOOP">
      <span class="card-index">07 /</span>
      <span class="card-name">PythonOOP</span>
      <span class="card-arrow">→ Open</span>
    </a>
  </div>

  <p class="footer">Click a module to open its folder</p>
  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    let W, H, particles = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); init(); });

    class Particle {
      constructor() { this.reset(true); }
      reset(init = false) {
        this.x = Math.random() * W;
        this.y = init ? Math.random() * H : H + 10;
        this.size = Math.random() * 2 + 0.5;
        this.speedY = -(Math.random() * 0.4 + 0.1);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.6 + 0.1;
        this.pulse = Math.random() * Math.PI * 2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.pulse += 0.02;
        this.opacity = 0.15 + Math.sin(this.pulse) * 0.15;
        if (this.y < -10) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 241, 53, ${this.opacity})`;
        ctx.fill();
      }
    }

    // Grid lines
    function drawGrid() {
      ctx.strokeStyle = 'rgba(200, 241, 53, 0.03)';
      ctx.lineWidth = 1;
      const spacing = 60;
      const t = Date.now() * 0.00008;
      const offsetX = (t * 20) % spacing;
      const offsetY = (t * 10) % spacing;

      for (let x = -spacing + offsetX; x < W + spacing; x += spacing) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = -spacing + offsetY; y < H + spacing; y += spacing) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
    }

    // Glowing orbs
    let orbs = [
      { x: 0.2, y: 0.5, r: 300, color: '100,200,20', speed: 0.0003 },
      { x: 0.8, y: 0.2, r: 250, color: '20,100,200', speed: 0.0004 },
      { x: 0.5, y: 0.9, r: 200, color: '200,50,150', speed: 0.0002 },
    ];

    function drawOrbs(t) {
      orbs.forEach((o, i) => {
        const cx = (Math.sin(t * o.speed + i) * 0.15 + o.x) * W;
        const cy = (Math.cos(t * o.speed * 0.7 + i) * 0.1 + o.y) * H;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, o.r);
        grad.addColorStop(0, `rgba(${o.color}, 0.08)`);
        grad.addColorStop(1, `rgba(${o.color}, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, o.r, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function init() {
      particles = Array.from({ length: 80 }, () => new Particle());
    }
    init();

    function loop() {
      const t = Date.now();
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, W, H);

      drawOrbs(t);
      drawGrid();
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
